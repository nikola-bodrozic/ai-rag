services:
  # --- PHOENIX / QDRANT VEKTORSKA BAZA ---
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant_vector_db
    ports:
      - "6333:6333"  # Glavni API port za komunikaciju sa Pythonom
      - "6334:6334"  # gRPC port (za ultra brzu pretragu)
    volumes:
      - qdrant_data:/qdrant/storage  # Trajno čuvanje vektora na tvom disku
    restart: always

  # --- TVOJA LANGGRAPH / PYTHON APLIKACIJA ---
  app:
    build: .
    container_name: langgraph_app
    ports:
      - "8000:8000"  # Pristup tvom API-ju preko http://localhost:8000
    volumes:
      - .:/app  # "Live reload" - svaka izmena u kodu na Windowsu se odmah vidi u Dockeru
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}  # Povlači ključ iz tvog lokalnog .env fajla
      - QDRANT_HOST=qdrant             # Python se povezuje na ovaj hostname unutar Docker mreže
      - QDRANT_PORT=6333
    depends_on:
      - qdrant  # Čeka da se Qdrant podigne pre nego što pokrene Python aplikaciju
    restart: always

volumes:
  qdrant_data:  # Definišemo imenovani volumen za trajnost podataka